execution_task_code_scaffold:
  agent: execution_agent
  description: >
    You are given the following approved product summary from Phase 3:

    {product_summary}

    The original business brief was: {user_brief}

    YOUR ONLY JOB IN THIS TASK: Generate the starter repository structure using code_scaffold_tool.

    Generate a starter directory structure appropriate for the tech stack described in the
    product summary. Include placeholder files with brief comments explaining each file's purpose.

    You MUST call code_scaffold_tool with BOTH of these arguments every time:
      - repo_name: a snake_case name derived from the business idea (no spaces)
      - structure: a JSON object (not a string) mapping relative file paths to their contents

    Example call (do not omit either argument):
      repo_name: "my_app"
      structure: {{"README.md": "# My App", "src/main.py": "# entrypoint", "src/models.py": "# data models", "requirements.txt": "fastapi"}}

    Build a realistic structure for the chosen tech stack — at minimum include a README,
    entry point, and one file per major layer (e.g. routes, models, config).

    When done, confirm the scaffold was generated successfully and list the top-level
    directories created.
  expected_output: >
    Confirmation that the starter repo was scaffolded under outputs/generated_code/,
    with a list of the top-level directories and files created.
